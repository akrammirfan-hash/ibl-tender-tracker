<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IBL Healthcare · MSD Tender Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600;700&display=swap');

/* ── DESIGN TOKENS ── */
:root {
  --bg:       #EDF1F7;
  --card:     #FFFFFF;
  --raised:   #F4F7FB;
  --border:   #D6E0ED;
  --border2:  #E8EFF8;

  --teal:     #0085A3;
  --teal-lt:  #E6F4F8;
  --teal-md:  rgba(0,133,163,.12);
  --teal-g:   rgba(0,133,163,.25);

  --green:    #15803D;
  --green-lt: #ECFDF5;
  --amber:    #B45309;
  --amber-lt: #FFF8ED;
  --red:      #DC2626;
  --red-lt:   #FEF2F2;
  --blue:     #1D4ED8;
  --blue-lt:  #EEF2FF;
  --purple:   #6D28D9;
  --purple-lt:#F5F3FF;
  --slate:    #475569;

  --t1: #0C1A2E;
  --t2: #334E68;
  --t3: #7A95B0;
  --t4: #B8CDD9;

  --sh1: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --sh2: 0 4px 16px rgba(0,0,0,.07), 0 1px 3px rgba(0,0,0,.05);
  --sh3: 0 8px 32px rgba(0,0,0,.09);

  --fh: 'Syne', sans-serif;
  --fb: 'DM Sans', sans-serif;
  --fm: 'JetBrains Mono', monospace;
  --r:  10px;
  --r2: 14px;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { background:var(--bg); min-height:100vh; font-family:var(--fb); color:var(--t1); }

/* subtle dot bg */
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image: radial-gradient(circle, rgba(0,133,163,.04) 1px, transparent 1px);
  background-size: 24px 24px;
}
#app { position:relative; z-index:1; }

/* ════════════════════════════════════════════════════
   HEADER
════════════════════════════════════════════════════ */
.hdr {
  background:#fff; border-bottom:1px solid var(--border);
  box-shadow:var(--sh1); padding:0 32px;
  position:sticky; top:0; z-index:200;
}
.hdr-top {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 0 10px; gap:16px; flex-wrap:wrap;
}
.brand { display:flex; align-items:center; gap:12px; }
.brand-logo {
  width:40px; height:40px; border-radius:10px; flex-shrink:0;
  background:linear-gradient(135deg,var(--teal) 0%,#006882 100%);
  display:flex; align-items:center; justify-content:center;
  font-size:18px; box-shadow:0 2px 12px var(--teal-g);
}
.brand-name { font-family:var(--fh); font-size:15px; font-weight:800; color:var(--t1); letter-spacing:-.3px; }
.brand-sub  { font-family:var(--fm); font-size:9.5px; color:var(--t3); margin-top:2px; letter-spacing:.6px; }

/* Live status */
.live-row {
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  padding:6px 14px; border-radius:99px;
  background:var(--raised); border:1px solid var(--border);
  font-size:11px; color:var(--t2); font-family:var(--fm);
}
.ldot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.ldot.ok   { background:var(--green); box-shadow:0 0 6px rgba(21,128,61,.5); animation:blink 2.5s infinite; }
.ldot.spin { background:var(--amber); animation:blink .7s infinite; }
.ldot.err  { background:var(--red); }
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.rfbtn {
  padding:3px 10px; border-radius:5px; border:1px solid var(--border);
  background:#fff; font-size:10px; color:var(--t2);
  cursor:pointer; font-family:var(--fm); transition:all .15s;
}
.rfbtn:hover { border-color:var(--teal); color:var(--teal); }

/* Division tabs */
.dtabs { display:flex; border-top:1px solid var(--border2); overflow-x:auto; }
.dtab {
  padding:9px 18px; font-size:12px; font-weight:600;
  border:none; cursor:pointer; background:transparent;
  color:var(--t3); border-bottom:2.5px solid transparent;
  transition:all .15s; font-family:var(--fb);
  display:flex; align-items:center; gap:6px; white-space:nowrap;
}
.dtab.on { color:var(--teal); border-bottom-color:var(--teal); background:var(--teal-lt); }
.dtab:hover:not(.on) { color:var(--t2); background:var(--raised); }
.tpill {
  padding:1px 7px; border-radius:99px;
  font-size:10px; font-family:var(--fm); font-weight:600;
}
.ddot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

/* ════════════════════════════════════════════════════
   ALERT BAR
════════════════════════════════════════════════════ */
.abar {
  background:#FEFAF4; border-bottom:1px solid #F3E4C4;
  padding:9px 32px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;
}
.achip {
  display:flex; align-items:center; gap:7px;
  padding:5px 13px; border-radius:6px;
  font-size:11px; font-weight:600;
}
.achip.c { background:var(--red-lt);    color:#991B1B; border:1px solid #FECACA; }
.achip.w { background:var(--amber-lt);  color:#78350F; border:1px solid #FDE68A; }
.pls { width:7px; height:7px; border-radius:50%; display:inline-block; flex-shrink:0; }
.pls.r { background:var(--red);   animation:blink 1.4s infinite; }
.pls.a { background:var(--amber); }
.alink {
  margin-left:auto; padding:5px 12px; border-radius:6px;
  border:1px solid var(--border); background:#fff;
  font-size:11px; font-weight:600; color:var(--t2);
  cursor:pointer; transition:all .15s;
}
.alink:hover { border-color:var(--teal); color:var(--teal); }

/* ════════════════════════════════════════════════════
   BODY
════════════════════════════════════════════════════ */
.body { padding:22px 32px 36px; }

/* ── KPI GRID ── */
.kgrid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px; margin-bottom:20px;
}
.kpi {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r2); padding:16px 17px;
  box-shadow:var(--sh1); position:relative; overflow:hidden;
  transition:box-shadow .2s;
}
.kpi:hover { box-shadow:var(--sh2); }
.kpi::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  border-radius:var(--r2) var(--r2) 0 0;
}
.kpi.teal::before   { background:var(--teal); }
.kpi.green::before  { background:var(--green); }
.kpi.amber::before  { background:var(--amber); }
.kpi.blue::before   { background:var(--blue); }
.kpi.red::before    { background:var(--red); }
.kpi.purple::before { background:var(--purple); }
.kico { position:absolute; right:13px; top:14px; font-size:18px; opacity:.2; }
.kv {
  font-family:var(--fm); font-size:21px; font-weight:600;
  line-height:1; margin-bottom:4px;
}
.kv.teal   { color:var(--teal); }
.kv.green  { color:var(--green); }
.kv.amber  { color:var(--amber); }
.kv.blue   { color:var(--blue); }
.kv.red    { color:var(--red); }
.kv.purple { color:var(--purple); }
.kl { font-size:10px; font-weight:700; color:var(--t2); letter-spacing:.5px; }
.ks { font-size:9.5px; color:var(--t3); margin-top:3px; font-family:var(--fm); }

/* ── TOOLBAR ── */
.tbar { display:flex; gap:9px; margin-bottom:14px; flex-wrap:wrap; align-items:center; }
.srch {
  flex:1; min-width:200px; background:var(--card);
  border:1px solid var(--border); border-radius:8px;
  padding:8px 14px; font-size:12px; color:var(--t1);
  font-family:var(--fb); outline:none; box-shadow:var(--sh1);
  transition:border-color .2s;
}
.srch:focus { border-color:var(--teal); }
.srch::placeholder { color:var(--t3); }
.sfwrap { display:flex; gap:5px; flex-wrap:wrap; }
.sf {
  padding:7px 12px; font-size:11px; font-weight:600; border-radius:7px;
  cursor:pointer; border:1px solid var(--border);
  background:var(--card); color:var(--t2);
  transition:all .15s; font-family:var(--fb); white-space:nowrap;
  box-shadow:var(--sh1);
}
.sf.on  { background:var(--teal); color:#fff; border-color:var(--teal); }
.sf:hover:not(.on) { border-color:var(--teal); color:var(--teal); }

/* ── TABLE ── */
.twrap {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r2); overflow:hidden; box-shadow:var(--sh2);
}
.tcap {
  padding:11px 18px; background:var(--raised);
  border-bottom:1px solid var(--border2);
  display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;
}
.tcl { font-size:11px; font-weight:700; color:var(--t2); letter-spacing:.4px; }
.tcr { font-size:10px; color:var(--t3); font-family:var(--fm); }
.tscroll { overflow-x:auto; }
table { width:100%; border-collapse:collapse; min-width:820px; }
thead th {
  padding:9px 14px; text-align:left; font-size:10px; font-weight:700;
  color:var(--t3); letter-spacing:.8px; background:#EDF1F7;
  border-bottom:1px solid var(--border);
  cursor:pointer; user-select:none; white-space:nowrap;
}
thead th.r { text-align:right; }
thead th:hover { color:var(--t2); }
tbody tr {
  border-left:3px solid transparent;
  border-bottom:1px solid var(--border2);
  cursor:pointer; transition:background .1s;
}
tbody tr:last-child { border-bottom:none; }
tbody tr:hover  { background:#EEF5FF; }
tbody tr.xp     { background:#E8F4F8; }
tbody tr.cr     { border-left-color:var(--red); }
tbody tr.wa     { border-left-color:var(--amber); }
td { padding:10px 14px; font-size:12px; color:var(--t1); vertical-align:middle; }

/* cell types */
.tid  { font-family:var(--fm); font-size:10.5px; color:var(--t2); display:flex; align-items:center; gap:5px; }
.tinst { font-weight:600; font-size:12px; line-height:1.3; }
.tdiv  { font-size:10px; color:var(--t3); margin-top:1px; }
.tval  { font-family:var(--fm); font-size:12px; font-weight:600; color:var(--teal); text-align:right; }
.tvsub { font-size:9px; color:var(--t3); font-family:var(--fm); text-align:right; margin-top:2px; }
.earr  { font-size:9px; color:var(--t3); transition:transform .18s; display:inline-block; }
.earr.op { transform:rotate(90deg); color:var(--teal); }

/* ── BADGES ── */
.badge {
  padding:3px 9px; border-radius:5px; font-size:10px;
  font-weight:700; letter-spacing:.4px; white-space:nowrap; display:inline-block;
}
.badge.cmp  { background:var(--green-lt);  color:var(--green); }
.badge.pp   { background:var(--blue-lt);   color:var(--blue); }
.badge.sp   { background:var(--amber-lt);  color:var(--amber); }
.badge.pop  { background:var(--teal-lt);   color:var(--teal); }
.badge.awd  { background:#F0FAFA;           color:#006882; }
.badge.na   { background:var(--raised);    color:var(--t3); border:1px solid var(--border); }
.badge.df   { background:var(--red-lt);    color:var(--red); }
.badge.ev   { background:var(--purple-lt); color:var(--purple); }
.badge.bi   { background:var(--blue-lt);   color:var(--blue); }

/* ── MILESTONES ── */
.ms { min-width:300px; }
.mstr { display:flex; align-items:flex-start; }
.msst { display:flex; flex-direction:column; align-items:center; gap:2px; }
.msd {
  width:20px; height:20px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:8px; font-weight:800; transition:all .15s;
}
.msd.dn { background:var(--teal);  color:#fff; box-shadow:0 0 6px var(--teal-g); }
.msd.fl { background:var(--amber); color:#fff; }
.msd.ct { background:var(--red);   color:#fff; }
.msd.sk { background:var(--border); color:var(--t3); }
.msd.id { background:var(--raised); color:var(--t3); border:1.5px solid var(--border); }
.mslb { font-size:7px; color:var(--t3); text-align:center; white-space:pre; line-height:1.2; max-width:36px; }
.mscn { height:2px; width:11px; flex-shrink:0; margin-bottom:15px; }
.mscn.dn { background:var(--teal); }
.mscn.id { background:var(--border); }
.msprog { display:flex; align-items:center; gap:6px; margin-top:5px; }
.msbar { flex:1; height:3px; background:var(--border); border-radius:99px; overflow:hidden; }
.msfill { height:100%; border-radius:99px; transition:width .4s; }
.mspct { font-family:var(--fm); font-size:9px; color:var(--t3); min-width:28px; text-align:right; }

/* ── ALERT DOTS ── */
.adts { display:flex; flex-direction:column; gap:3px; align-items:center; min-width:18px; }
.adt  { width:7px; height:7px; border-radius:50%; }
.adt.c { background:var(--red); }
.adt.w { background:var(--amber); }

/* ── DETAIL PANEL ── */
.dp td { padding:0; }
.dpin {
  padding:16px 18px 20px 34px; background:#F2F7FA;
  border-top:1px solid var(--border);
  display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
  gap:22px;
}
.dtt { font-size:9px; font-weight:700; color:var(--t3); letter-spacing:1px; text-transform:uppercase; margin-bottom:7px; }
.dr  { display:flex; gap:8px; margin-bottom:5px; }
.dl  { font-size:10px; color:var(--t3); min-width:115px; flex-shrink:0; }
.dv  { font-size:11px; color:var(--t2); font-weight:500; }
.dv.hi { color:var(--teal); font-family:var(--fm); font-weight:600; }
.dv.ok { color:var(--green); font-weight:600; }
.dv.na { color:var(--t4); }
.alr { display:flex; gap:7px; margin-bottom:6px; align-items:flex-start; }
.ald { width:6px; height:6px; border-radius:50%; margin-top:3px; flex-shrink:0; }
.alt { font-size:11px; line-height:1.4; }
.alt.c { color:#991B1B; } .alt.w { color:#78350F; } .alt.i { color:var(--t2); }
.pprod {
  display:inline-flex; align-items:center; gap:5px;
  background:#fff; border:1px solid var(--border);
  border-radius:4px; padding:3px 8px; margin:2px;
  font-size:10px; color:var(--t2);
}
.ppq { color:var(--teal); font-family:var(--fm); font-size:9px; }

/* milestone legend in detail */
.ms-legend { display:flex; gap:12px; flex-wrap:wrap; }
.msl-item  { display:flex; align-items:center; gap:5px; font-size:10px; color:var(--t2); }
.msl-dot   { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

/* ── DIVISION CARDS ── */
.dcards {
  display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:14px; margin-top:22px;
}
.dc {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r2); padding:18px 20px;
  box-shadow:var(--sh1); position:relative; overflow:hidden;
  transition:box-shadow .2s;
}
.dc:hover { box-shadow:var(--sh2); }
.dc-top-bar { position:absolute; top:0; left:0; right:0; height:3px; border-radius:var(--r2) var(--r2) 0 0; }
.dcn { font-family:var(--fh); font-size:13px; font-weight:800; margin-bottom:2px; }
.dcc { font-family:var(--fm); font-size:10px; color:var(--t3); margin-bottom:10px; }
.dc-vals { display:flex; gap:14px; margin-bottom:11px; }
.dc-val-blk { }
.dc-val-lbl { font-size:9px; color:var(--t3); font-family:var(--fm); margin-bottom:2px; }
.dc-val-num { font-family:var(--fm); font-size:16px; font-weight:600; }
.dcst { display:flex; gap:14px; margin-bottom:11px; }
.dcs-v { font-family:var(--fm); font-size:15px; font-weight:600; }
.dcs-l { font-size:9px; color:var(--t3); }
.dcpb  { height:4px; border-radius:99px; background:var(--border); overflow:hidden; margin-bottom:4px; }
.dcpf  { height:100%; border-radius:99px; transition:width .5s; }
.dcr   { font-size:9px; color:var(--t3); font-family:var(--fm); }

/* ── LOADING / ERROR ── */
.cstate {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:80px 20px; text-align:center; min-height:70vh;
}
.ci { font-size:50px; margin-bottom:16px; animation:bob .9s ease-in-out infinite alternate; }
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(-9px)}}
.ct { font-family:var(--fh); font-size:20px; font-weight:700; color:var(--t2); margin-bottom:8px; }
.cs { font-size:13px; color:var(--t3); max-width:400px; line-height:1.7; margin-bottom:20px; }
.lbar { width:220px; height:3px; background:var(--border); border-radius:99px; overflow:hidden; }
.lfill { height:100%; background:var(--teal); border-radius:99px; animation:ld 1.3s ease-in-out infinite; }
@keyframes ld{0%{width:0%}50%{width:70%}100%{width:100%}}
.ebtn {
  padding:11px 26px; background:var(--teal); color:#fff; border:none;
  border-radius:9px; font-size:13px; font-weight:700;
  cursor:pointer; font-family:var(--fh); transition:opacity .2s;
}
.ebtn:hover { opacity:.85; }

.norows td { padding:40px; text-align:center; font-size:13px; color:var(--t3); }
.footer {
  margin-top:28px; padding:14px 0;
  border-top:1px solid var(--border);
  font-size:10px; color:var(--t3); text-align:center; font-family:var(--fm);
}

@media(max-width:768px){
  .hdr,.body,.abar { padding-left:14px; padding-right:14px; }
  .mslb { display:none; } .mscn { width:7px; } .ms { min-width:190px; }
  .body { padding:12px 14px 24px; }
}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ════════════════════════════════════════════════════
   CONFIG — UPDATE THESE 3 URLS AFTER RE-PUBLISHING
════════════════════════════════════════════════════ */
const RAW_SHEETS = [
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vSfGtrI5j3hdDCDzMOf4RxX82vNDEOr67kAOA6n_G1Hnq31PgTDc8cpKPnVccetvg/pub?gid=1230396766&single=true&output=csv",
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vSfGtrI5j3hdDCDzMOf4RxX82vNDEOr67kAOA6n_G1Hnq31PgTDc8cpKPnVccetvg/pub?gid=609187936&single=true&output=csv",
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vSfGtrI5j3hdDCDzMOf4RxX82vNDEOr67kAOA6n_G1Hnq31PgTDc8cpKPnVccetvg/pub?gid=1142945168&single=true&output=csv"
];
const PROXIES = [
  u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://thingproxy.freeboard.io/fetch/${u}`,
];

async function fetchWithFallback(rawUrl) {
  for (const proxy of PROXIES) {
    try {
      const url = proxy(rawUrl);
      const r = await fetch(url, { signal: AbortSignal.timeout(9000) });
      if (r.ok) {
        const text = await r.text();
        if (text && text.length > 20 && text.includes(",")) return text;
      }
    } catch(e) { /* try next */ }
  }
  throw new Error("Could not reach Google Sheets — ensure sheet is published to web as CSV");
}
const REFRESH_MS  = 5 * 60 * 1000;
const DC          = { Hospicare:"#0085A3", "Critical Care":"#1D4ED8", "Medical Care":"#B45309" };

/* ════════════════════════════════════════════════════
   PARSING UTILITIES
════════════════════════════════════════════════════ */
const cl  = v => (v == null) ? "" : String(v).replace(/\xa0/g," ").trim();
const isR = v => {
  const s = cl(v).toLowerCase().replace(/\s/g,"");
  return s !== "" && s !== "-" && s !== "—" && s !== "awaited"
      && s !== "noidea" && s !== "n/a" && s !== "nil"
      && !s.startsWith("90days");
};
const yn  = v => ["yes","y","done","created"].includes(cl(v).toLowerCase());
const toN = v => { const n=parseFloat(String(v||"").replace(/,/g,"").replace(/\s/g,"")); return isNaN(n)||n===0?null:n; };
const fP  = n => {
  if(!n||isNaN(n)||n<=0) return null;
  if(n>=1e9) return`${(n/1e9).toFixed(2)}B`;
  if(n>=1e6) return`${(n/1e6).toFixed(1)}M`;
  if(n>=1e3) return`${Math.round(n/1e3)}K`;
  return Math.round(n).toLocaleString();
};
const divOf = id => {
  const s=String(id||"").toUpperCase().trim();
  return s.startsWith("HC")?"Hospicare":s.startsWith("CC")?"Critical Care":"Medical Care";
};

const HDR = {
  "tender id":"id","tenderid":"id",
  "tender name":"nm","tendername":"nm",
  "institution":"inst",
  "bid submitted (y/n)":"bs","bidsubmitted(y/n)":"bs",
  "bid amount":"ba","bidamount":"ba",
  "contract awarded (y/n)":"aw","contractawarded(y/n)":"aw",
  "tenderstatus":"ts","tender status":"ts",
  "reason for rejection":"rj",
  "notes":"nt",
  "po number":"pn","po number (institute po)":"pn",
  "po to principal status":"potp",
  "po generation date":"pd",
  "supplies due date":"sd","suppliesduedate":"sd",
  "supplies delivered (y/n)":"sdl","suppliesdelivered(y/n)":"sdl",
  "suppliesdelivereddate / dn acknowledgement date":"sdd",
  "dtl date  / test opening date":"dtl","dtl date / test opening date":"dtl",
  "quantity":"qty","products":"pr","unit rate":"ur",
  "po value":"pv","contract value":"cv","contractvalue":"cv",
  "payment terms days":"pt","paymenttermsdays":"pt",
  "lc/bcissued (y/n)":"lc","lc/bcissued(y/n)":"lc",
  "lc/bc expiry date":"le","lc/bcexpirydate":"le",
  "payment expected date":"pe","paymentexpecteddate":"pe",
  "payment received date":"pr2","paymentreceiveddate":"pr2",
  "credit days from supplier":"cds","creditdaysfromsupplier":"cds",
  "status":"st",
  "remarks from concerned business":"rm"
};

function bfm(hdr){
  const m={};
  hdr.forEach((h,i)=>{
    const k=String(h||"").trim().toLowerCase().replace(/\s+/g," ");
    const c=HDR[k];
    if(c && !(c in m)) m[c]=i;
  });
  return (row,f) => (f in m && m[f]<row.length) ? cl(row[m[f]]) : "";
}

function parseRows(rows){
  if(!rows||rows.length<2) return [];
  const g=bfm(rows[0]); const rmap={}; const rorder=[]; let cur=null;

  for(let i=1;i<rows.length;i++){
    const row=rows[i];
    if(!row||row.every(v=>!cl(v))) continue;
    const rid=g(row,"id"); const hasId=rid&&isR(rid);

    if(hasId){
      // ── DEDUP: same ID = merge as sub-row ──
      if(rmap[rid]){
        cur=rmap[rid];
        const pv2=toN(g(row,"pv")), cv2=toN(g(row,"cv")), ba2=toN(g(row,"ba"));
        if(pv2) cur.tpv=(cur.tpv||0)+pv2;
        if(cv2&&!cur.cv) cur.cv=cv2;
        if(ba2&&!cur.ba) cur.ba=ba2;
        const p=g(row,"pr"),q=g(row,"qty"),u=g(row,"ur");
        if(p||q) cur.prods.push({product:p,qty:q,ur:u,pv:toN(g(row,"pv"))});
        continue;
      }

      if(cur&&!rmap[cur.id]) rmap[cur.id]=cur;

      const ts=g(row,"ts"), tsl=ts.toLowerCase();
      const nt=g(row,"nt").toLowerCase();
      const rj=g(row,"rj").toLowerCase();
      const rm=g(row,"rm").toLowerCase();
      const aw=g(row,"aw");

      // ── AWARDED LOGIC ──
      const isAw = yn(aw)
        || tsl.includes("finalized")
        || (tsl.includes("award") && !tsl.includes("not"))
        || tsl.includes("supply scheduled");

      const notAw = (aw.toLowerCase()==="no")
        || (!yn(aw) && (
          nt.includes("n/award") || nt.includes("n/ award")
          || rj.includes("higher price") || nt.includes("higher price")
          || rj.includes("enduser rejection") || nt.includes("enduser rejection")
          || tsl.includes("not final")
        ));

      // PO from Institute
      const pn   = g(row,"pn");
      const pg   = isR(pn) && !["awaited","in process","contract awaited"].includes(pn.toLowerCase());

      // PO to Principal / Co
      const potp = g(row,"potp");
      const poCo = isR(potp) && potp.toLowerCase() !== "pending";

      // Supplies
      const sdl  = yn(g(row,"sdl"));

      // DTL
      const dtlr = g(row,"dtl").toLowerCase();
      const dtlF = dtlr.includes("fail")||dtlr.includes("mis brand");
      const dtlD = isR(dtlr) && !dtlr.includes("wait") && !dtlr.includes("pending") && !dtlF;

      // LC
      const lc   = yn(g(row,"lc"));

      // Payment
      const pr2  = g(row,"pr2");
      const payR = isR(pr2) && !["no idea","this month","after dtl","90 days"].some(x=>pr2.toLowerCase().includes(x));

      const pv   = toN(g(row,"pv"));
      const cv   = toN(g(row,"cv"));
      const ba   = toN(g(row,"ba"));

      // Smart cv: discard when cv is clearly a sub-product line (cv < ba*40%)
      const smartCv = (cv&&ba&&cv>=ba*0.4) ? cv : (cv&&!ba) ? cv : null;

      cur = {
        id:rid, div:divOf(rid), ts, tsl, nt, rj, rm,
        inst:g(row,"inst"), nm:g(row,"nm"),
        isAw, notAw,
        pg, pn, pd:g(row,"pd"),
        poCo, potp,
        sdl, sd:g(row,"sd"), sdd:g(row,"sdd"),
        dtlD, dtlF, dtlr,
        lc, le:g(row,"le"),
        payR, pe:g(row,"pe"), pr2,
        ba, cv:smartCv, pv, tpv:pv||0,
        pt:g(row,"pt"), st:g(row,"st"), cds:g(row,"cds"),
        prods:[], alerts:[], row:i
      };
      rmap[rid]=cur; rorder.push(rid);
      const p=g(row,"pr"),q=g(row,"qty"),u=g(row,"ur");
      if(p||q) cur.prods.push({product:p,qty:q,ur:u,pv});

    } else if(cur){
      const pv2=toN(g(row,"pv")), cv2=toN(g(row,"cv"));
      if(pv2) cur.tpv=(cur.tpv||0)+pv2;
      if(cv2&&!cur.cv) cur.cv=cv2;
      const p=g(row,"pr"),q=g(row,"qty"),u=g(row,"ur");
      if(p||q) cur.prods.push({product:p,qty:q,ur:u,pv:pv2});
    }
  }
  return rorder.map(id=>fin(rmap[id])).filter(Boolean);
}

function fin(t){
  const a=[];
  if(t.dtlF) a.push({s:"c",m:"DTL/quality test FAILED — immediate escalation required"});
  if(t.isAw&&!t.notAw&&!t.pg)  a.push({s:"c",m:"Contract awarded — institute PO not yet received"});
  if(t.pg&&!t.poCo)             a.push({s:"w",m:"Institute PO received — company PO to principal not issued"});
  if(t.poCo&&!t.sdl)            a.push({s:"w",m:"PO to principal issued — supplies not yet delivered"});
  if(t.sdl&&!t.dtlD&&!t.dtlF)  a.push({s:"w",m:"Supplies delivered — DTL/test result pending"});
  if(t.sdl&&!t.payR)            a.push({s:"w",m:"Supplies delivered — payment outstanding"});
  if(t.rm.includes("waiting for payment")&&!t.payR) a.push({s:"w",m:"Awaiting payment clearance from institution"});
  if(t.rm.includes("waiting for po")||t.rm.includes("waiting for award")) a.push({s:"w",m:"Awaiting PO/award letter from institution"});
  if(t.rm.includes("half remaining")||t.rm.includes("remaining")&&t.sdl) a.push({s:"w",m:"Partial delivery — remaining stock not yet supplied"});
  if(t.tsl.includes("not final")) a.push({s:"i",m:"Tender evaluation not yet finalized"});
  return {...t, alerts:a};
}

async function fetchAll(){
  if(S.state!=="ready") setState({state:"loading"});
  try{
    const results=await Promise.all(RAW_SHEETS.map(async rawUrl=>{
      const text = await fetchWithFallback(rawUrl);
      const p=Papa.parse(text,{skipEmptyLines:true});
      return parseRows(p.data);
    }));
    const all=results.flat();
    setState({tenders:all,state:"ready",lastFetch:new Date(),cd:REFRESH_MS/1000});
  }catch(e){
    setState({err:e.message||"Network error",state:S.tenders.length?"ready":"error"});
  }
}
function startTimers(){
  clearInterval(rfTimer); clearInterval(cdTimer);
  rfTimer=setInterval(fetchAll,REFRESH_MS);
  cdTimer=setInterval(()=>{
    S={...S,cd:S.cd<=1?REFRESH_MS/1000:S.cd-1};
    const el=document.getElementById("cd");
    if(el){ const s=S.cd; el.textContent=`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`; }
  },1000);
}

const fmtT = d => d?d.toLocaleTimeString("en-PK",{hour:"2-digit",minute:"2-digit",second:"2-digit"}):"—";
const fmtC = s => `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
const esc  = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

/* filter functions */
const STF = {
  "All":         ()=>true,
  "🔴 Alerts":   t=>t.alerts.some(a=>a.s==="c"||a.s==="w"),
  "Awarded":     t=>t.isAw&&!t.notAw,
  "PO Pending":  t=>t.isAw&&!t.notAw&&!t.pg,
  "Supply Pend": t=>t.pg&&!t.sdl,
  "DTL Pending": t=>t.sdl&&!t.dtlD&&!t.dtlF,
  "Pay Pending": t=>t.sdl&&!t.payR,
  "Completed":   t=>t.payR,
  "Not Awarded": t=>t.notAw
};

function getFiltered(){
  const {tenders,div,st,q,sf,sd}=S; const ql=q.toLowerCase();
  return tenders
    .filter(t=>div==="All"||t.div===div)
    .filter(t=>STF[st]?.(t)??true)
    .filter(t=>!ql||[t.id,t.inst,t.ts,t.div].some(f=>String(f||"").toLowerCase().includes(ql)))
    .sort((a,b)=>{
      let va=a[sf]??"", vb=b[sf]??"";
      if(typeof va==="number"&&typeof vb==="number") return sd==="asc"?va-vb:vb-va;
      va=String(va).toLowerCase(); vb=String(vb).toLowerCase();
      return sd==="asc"?va.localeCompare(vb):vb.localeCompare(va);
    });
}

function getKpis(){
  const t=S.tenders;
  return {
    total:    t.length,
    awarded:  t.filter(x=>x.isAw&&!x.notAw).length,
    poPend:   t.filter(x=>x.isAw&&!x.notAw&&!x.pg).length,
    supPend:  t.filter(x=>x.pg&&!x.sdl).length,
    dtlPend:  t.filter(x=>x.sdl&&!x.dtlD&&!x.dtlF).length,
    payPend:  t.filter(x=>x.sdl&&!x.payR).length,
    complete: t.filter(x=>x.payR).length,
    pipe:     t.reduce((s,x)=>s+(x.cv||x.ba||0),0),
    pvSecured:t.filter(x=>x.pg).reduce((s,x)=>s+(x.tpv||0),0),
    critC:    t.filter(x=>x.alerts.some(a=>a.s==="c")).length,
    warnC:    t.filter(x=>x.alerts.some(a=>a.s==="w")).length,
  };
}

function getDivC(){
  const c={All:S.tenders.length};
  S.tenders.forEach(t=>{c[t.div]=(c[t.div]||0)+1;});
  return c;
}

function badgeHtml(t){
  if(t.dtlF)                        return`<span class="badge df">DTL FAILED</span>`;
  if(t.tsl.includes("under eval"))  return`<span class="badge ev">UNDER EVAL</span>`;
  if(t.notAw)                       return`<span class="badge na">NOT AWARDED</span>`;
  if(t.payR)                        return`<span class="badge cmp">COMPLETE</span>`;
  if(t.sdl&&!t.payR)                return`<span class="badge pp">PAY PENDING</span>`;
  if(t.poCo&&!t.sdl)               return`<span class="badge sp">SUPPLY PEND</span>`;
  if(t.pg&&!t.poCo)                return`<span class="badge sp" style="background:#FFF3E0;color:#BF6000">CO PO PEND</span>`;
  if(t.isAw&&!t.pg)                return`<span class="badge pop">INST PO PEND</span>`;
  if(t.isAw)                       return`<span class="badge awd">AWARDED</span>`;
  return`<span class="badge bi">BID IN</span>`;
}

// 7-step milestone chain
const STEPS=[
  {k:"isAw",  lb:"Contract\nAwarded"},
  {k:"pg",    lb:"Inst. PO\nReceived"},
  {k:"poCo",  lb:"Co. PO to\nPrincipal"},
  {k:"sdl",   lb:"Supplies\nDelivered"},
  {k:"dtlD",  lb:"DTL\nCleared"},
  {k:"lc",    lb:"LC/BC\nIssued"},
  {k:"payR",  lb:"Payment\nReceived"},
];

function msHtml(t){
  const steps=STEPS.map(s=>{
    const done=!!t[s.k], skip=s.k==="isAw"&&t.notAw;
    const ct=(s.k==="dtlD"&&t.dtlF)||(s.k==="isAw"&&t.isAw&&!t.pg);
    const fl=(s.k==="payR"&&t.sdl&&!t.payR)
          ||(s.k==="poCo"&&t.pg&&!t.poCo)
          ||(s.k==="sdl"&&t.poCo&&!t.sdl);
    return{...s,done,skip,ct,fl};
  });
  const dn=steps.filter(s=>s.done&&!s.skip).length;
  const pct=Math.round(dn/steps.length*100);
  const fc=t.dtlF?"var(--red)":pct===100?"var(--green)":pct>50?"var(--teal)":"var(--amber)";
  let track="";
  steps.forEach((s,i)=>{
    const cls=s.skip?"sk":s.ct?"ct":s.fl?"fl":s.done?"dn":"id";
    const ico=s.skip?"×":(s.ct||s.fl)?"!":s.done?"✓":"·";
    track+=`<div class="msst"><div class="msd ${cls}">${ico}</div><div class="mslb">${esc(s.lb)}</div></div>`;
    if(i<steps.length-1) track+=`<div class="mscn ${s.done&&!s.skip?"dn":"id"}"></div>`;
  });
  return`<div class="ms">
    <div class="mstr">${track}</div>
    <div class="msprog">
      <div class="msbar"><div class="msfill" style="width:${pct}%;background:${fc}"></div></div>
      <span class="mspct">${pct}%</span>
    </div>
  </div>`;
}

function adotsHtml(a){
  const c=a.filter(x=>x.s==="c").length, w=a.filter(x=>x.s==="w").length;
  if(!c&&!w) return`<div style="width:18px"></div>`;
  return`<div class="adts">${c?`<div class="adt c" title="${c} critical"></div>`:""}${w?`<div class="adt w" title="${w} warning"></div>`:""}</div>`;
}

function detailHtml(t){
  const val=t.cv||t.ba||(t.tpv>0?t.tpv:null);
  const IR=(l,v,cls="")=>isR(v)?`<div class="dr"><span class="dl">${esc(l)}</span><span class="dv ${cls}">${esc(String(v).slice(0,90))}</span></div>`:"";

  // Alerts section
  let alertsHtml="";
  if(t.alerts.length){
    alertsHtml=`<div><div class="dtt">Active Alerts</div>${
      t.alerts.map(a=>`<div class="alr">

        <span class="alt ${a.s}">${esc(a.m)}</span>
      </div>`).join("")
    }</div>`;
  }

  // Procurement section
  const procHtml=`<div>
    <div class="dtt">Procurement Chain</div>
    ${IR("Institute PO No.",t.pn)}
    ${IR("PO Gen. Date",t.pd)}
    ${IR("Co. PO to Principal",t.potp,t.poCo?"ok":"na")}
    ${IR("Supplies Due",t.sd)}
    ${IR("Delivered On",t.sdd)}
    ${IR("DTL / Test Date",t.dtlr)}
    ${IR("LC / BC Issued",t.lc?"✅ Yes":"Not yet","na")}
    ${IR("LC Expiry",t.le)}
    ${IR("Payment Terms",t.pt)}
    ${IR("Pay Expected",t.pe)}
    ${IR("Pay Received",t.pr2,t.payR?"ok":"")}
    ${IR("Status Note",t.st)}
    ${val?`<div class="dr"><span class="dl">Contract Value</span><span class="dv hi">PKR ${fP(val)}</span></div>`:""}
    ${t.tpv>0?`<div class="dr"><span class="dl">PO Value Secured</span><span class="dv hi">PKR ${fP(t.tpv)}</span></div>`:""}
  </div>`;

  // Products
  let prodsHtml="";
  if(t.prods.length){
    const pills=t.prods.map(p=>`<div class="pprod">
      <span>${esc(cl(p.product)||"—")}</span>
      ${p.qty?`<span class="ppq">× ${esc(String(p.qty).slice(0,14))}</span>`:""}
      ${p.ur?`<span class="ppq">@ ${esc(p.ur)}</span>`:""}
      ${p.pv?`<span class="ppq">PKR ${fP(p.pv)}</span>`:""}
    </div>`).join("");
    prodsHtml=`<div><div class="dtt">Products (${t.prods.length})</div><div style="display:flex;flex-wrap:wrap">${pills}</div></div>`;
  }

  // Remarks
  let remHtml="";
  if(t.nt||t.rm){
    remHtml=`<div><div class="dtt">Notes & Remarks</div>
      ${t.nt?`<div style="font-size:11px;color:var(--t2);margin-bottom:4px;line-height:1.5">${esc(t.nt.slice(0,220))}</div>`:""}
      ${t.rm?`<div style="font-size:11px;color:var(--t3);font-style:italic;line-height:1.5">${esc(t.rm.slice(0,220))}</div>`:""}
    </div>`;
  }

  return`<div class="dpin">${alertsHtml}${procHtml}${prodsHtml}${remHtml}</div>`;
}

      const dv=t.cv||t.ba||null;
      const rc=`${hc?"cr":hw?"wa":""} ${isO?"xp":""}`;
      rowsH+=`<tr class="${rc}" onclick="toggleRow('${esc(t.id)}')">
        <td><span class="earr ${isO?"op":""}">▶</span></td>
        <td><div class="tid"><div class="ddot" style="background:${DC[t.div]||"var(--t3)"}"></div>${esc(t.id)}</div></td>
        <td><div class="tinst">${esc(t.inst||"—")}</div><div class="tdiv">${esc(t.div)}</div></td>
        <td>${badgeHtml(t)}</td>
        <td>${msHtml(t)}</td>
        <td>
          <div class="tval">${dv?`PKR ${fP(dv)}`:"—"}</div>
          ${t.tpv>0?`<div class="tvsub">PO: ${fP(t.tpv)}</div>`:""}
        </td>
        <td>${adotsHtml(t.alerts)}</td>
      </tr>`;
      if(isO) rowsH+=`<tr class="dp"><td colspan="7">${detailHtml(t)}</td></tr>`;
    });
  }

  /* division summary cards */
  let dcH="";
  ["Hospicare","Critical Care","Medical Care"].forEach(d=>{
    const dt=tenders.filter(t=>t.div===d);
    const aw=dt.filter(t=>t.isAw&&!t.notAw).length;
    const ac=dt.filter(t=>t.pg&&!t.payR).length;
    const al=dt.filter(t=>t.alerts.length).length;
    const pipe=dt.reduce((s,t)=>s+(t.cv||t.ba||0),0);
    const pvS=dt.filter(t=>t.pg).reduce((s,t)=>s+(t.tpv||0),0);
    const col=DC[d], rate=Math.round(aw/Math.max(dt.length,1)*100);
    dcH+=`<div class="dc">
      <div class="dc-top-bar" style="background:${col}"></div>
      <div class="dcn" style="color:${col}">${esc(d)}</div>
      <div class="dcc">${dt.length} tenders · ${aw} awarded</div>
      <div class="dc-vals">
        <div class="dc-val-blk">
          <div class="dc-val-lbl">PIPELINE</div>
          <div class="dc-val-num" style="color:${col}">${pipe?`PKR ${fP(pipe)}`:"—"}</div>
        </div>
        <div class="dc-val-blk">
          <div class="dc-val-lbl">PO SECURED</div>
          <div class="dc-val-num" style="color:var(--green)">${pvS?`PKR ${fP(pvS)}`:"—"}</div>
        </div>
      </div>
      <div class="dcst">
        <div><div class="dcs-v" style="color:${col}">${aw}</div><div class="dcs-l">Awarded</div></div>
        <div><div class="dcs-v" style="color:var(--blue)">${ac}</div><div class="dcs-l">Active</div></div>
        <div><div class="dcs-v" style="color:${al>0?"var(--red)":"var(--t3)"}">${al}</div><div class="dcs-l">Alerts</div></div>
      </div>
      <div class="dcpb"><div class="dcpf" style="width:${rate}%;background:${col}"></div></div>
      <div class="dcr">${rate}% award rate</div>
    </div>`;
  });

  app.innerHTML=`
    <div class="hdr">
      <div class="hdr-top">
        <div class="brand">
          <div class="brand-logo">🏥</div>
          <div>
            <div class="brand-name">IBL Healthcare · MSD Division</div>
            <div class="brand-sub">TENDER PROGRESSION TRACKER · FY 25–26 · LIVE</div>
          </div>
        </div>
        <div class="live-row">
          <div class="ldot ${ldotCls}"></div>
          <span>${state==="loading"?"Refreshing data…":`Updated: ${fmtT(lastFetch)}`}</span>
          <span style="color:var(--t4)">|</span>
          <span>Refresh in <strong id="cd">${fmtC(cd)}</strong></span>
          <button class="rfbtn" onclick="manualRefresh()">↻ Now</button>
        </div>
      </div>
      <div class="dtabs">${tabsH}</div>
    </div>

    ${abarH}

    <div class="body">
      ${kH}
      <div class="tbar">
        <input class="srch" placeholder="🔍  Search Tender ID, institution, division…"
          value="${esc(q)}" oninput="setQ(this.value)"/>
        <div class="sfwrap">${sfH}</div>
      </div>
      <div class="twrap">
        <div class="tcap">
          <div class="tcl">
            SHOWING ${filtered.length} OF ${tenders.length} TENDERS
            ${div!=="All"?`· ${esc(div.toUpperCase())}`:""}
            ${st!=="All"?`· ${esc(st.toUpperCase())}` :""}
          </div>
          <div class="tcr">Click any row to expand full procurement chain</div>
        </div>
        <div class="tscroll">
          <table>
            <thead><tr>
              <th style="width:22px"></th>
              <th onclick="tSort('id')">TENDER ID ${si("id")}</th>
              <th onclick="tSort('inst')">INSTITUTION ${si("inst")}</th>
              <th>STAGE</th>
              <th>PROCUREMENT MILESTONES</th>
              <th class="r" onclick="tSort('cv')">VALUE ${si("cv")}</th>
              <th class="r" style="width:34px">⚑</th>
            </tr></thead>
            <tbody>${rowsH}</tbody>
          </table>
        </div>
      </div>
      <div class="dcards">${dcH}</div>
      <div class="footer">
        IBL HEALTHCARE · MSD DIVISION · TENDER TRACKER FY 25–26 · LIVE FROM GOOGLE SHEETS · AUTO-REFRESH 5 MIN
        · ${new Date().toLocaleDateString("en-PK",{day:"2-digit",month:"short",year:"numeric"})}
      </div>
    </div>`;
}

/* ════════════════════════════════════════════════════
   EVENT HANDLERS
════════════════════════════════════════════════════ */
function setDiv(d)    { setState({div:d}); }
function setSt(s)     { setState({st:s}); }
function setQ(v)      { S.q=v; render(); }
function viewAlerts() { setState({st:"🔴 Alerts",div:"All"}); }
function retryFetch() { fetchAll(); }
function manualRefresh(){ fetchAll(); setState({cd:REFRESH_MS/1000}); }
function tSort(f)     { if(S.sf===f) setState({sd:S.sd==="asc"?"desc":"asc"}); else setState({sf:f,sd:"asc"}); }
function toggleRow(id){ setState({exp:{...S.exp,[id]:!S.exp[id]}}); }

/* ════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════ */
fetchAll();
startTimers();
</script>
</body>
</html>
